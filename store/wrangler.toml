name = "fixthevuln-checkout"
main = "cloudflare-worker.js"
compatibility_date = "2024-09-23"

[[r2_buckets]]
binding = "PLANNERS"
bucket_name = "fixthevuln-planners"

[[d1_databases]]
binding = "DB"
database_name = "fixthevuln-errors"
database_id = "PLACEHOLDER"  # Run: wrangler d1 create fixthevuln-errors — then paste the ID here
