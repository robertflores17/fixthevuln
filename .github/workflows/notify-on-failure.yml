name: Notify on workflow failure

# Watches the critical automated pipelines. When any of them finishes with a
# 'failure' conclusion, emails an alert via Resend the same day — so breakage
# (like the June 2026 blog crash) reaches you immediately instead of sitting
# unnoticed. Requires repo secret RESEND_API_KEY and repo variable ALERT_EMAIL.
#
# The daily CVE publish runs as an external Claude trigger (not a GitHub
# workflow), so it can't be watched here; the Saturday sweep's KEV-freshness
# check is the backstop for that one.

on:
  workflow_run:
    workflows:
      - "Publish Blog Posts & Marketing Content"
      - "Fetch CISA KEV Vulnerabilities"
      - "Reconcile sitemap & llms.txt"
      - "Propagate to Search Engines & AI Crawlers"
      - "AI Security Trend Roundup"
      - "Weekly Educational Page Audit"
      - "Saturday Health Check"
    types: [completed]

permissions:
  contents: read

jobs:
  alert:
    # Only fire on an actual failure, not success/cancelled/skipped.
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Email the failure via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ vars.ALERT_EMAIL }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          WF_URL: ${{ github.event.workflow_run.html_url }}
          WF_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WF_EVENT: ${{ github.event.workflow_run.event }}
          WF_TIME: ${{ github.event.workflow_run.updated_at }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::error::RESEND_API_KEY secret is not set — add it with: gh secret set RESEND_API_KEY"
            exit 1
          fi
          subject="🔴 FixTheVuln: \"${WF_NAME}\" failed"
          body=$(printf 'The workflow "%s" finished with status: FAILURE.\n\nBranch:  %s\nTrigger: %s\nWhen:    %s\n\nLogs:    %s\n\n— automated alert from notify-on-failure.yml' \
            "$WF_NAME" "$WF_BRANCH" "$WF_EVENT" "$WF_TIME" "$WF_URL")
          # -o keeps the third-party response body out of the job log.
          http=$(jq -n --arg from "FixTheVuln Alerts <hello@fixthevuln.com>" \
                --arg to "$ALERT_EMAIL" --arg subject "$subject" --arg text "$body" \
                '{from:$from, to:[$to], subject:$subject, text:$text}' \
          | curl -sS -o /tmp/resend.json -w '%{http_code}' -X POST https://api.resend.com/emails \
                -H "Authorization: Bearer $RESEND_API_KEY" \
                -H "Content-Type: application/json" -d @-)
          if grep -q '"id"' /tmp/resend.json; then
            echo "Failure alert emailed."
          else
            echo "::error::Resend send failed (HTTP $http) — see job for the missing message id."
            exit 1
          fi
