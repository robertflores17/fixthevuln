name: Fetch CISA KEV Vulnerabilities

on:
  schedule:
    # Runs daily at 7 AM Pacific (15:00 UTC)
    # Note: During Daylight Saving Time, this will be 8 AM PDT
    - cron: '0 15 * * *'
  workflow_dispatch:
    # Allows manual trigger for testing

jobs:
  fetch-and-create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run KEV fetch script
        id: fetch
        run: |
          python scripts/fetch_kev.py

      - name: Run entity extraction
        if: steps.fetch.outputs.has_new == 'true'
        run: |
          python scripts/entity_extractor.py data/kev-data.json --output data/cve-entities.json || echo "Entity extraction skipped (no kev-data.json or script error)"

      - name: Push all changes directly to main
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data/kev-data.json data/pending_review.json data/cve-entities.json data/kev.json data/seen_cves.json data/REVIEW.md data/REVIEW_SUMMARY.md
          if git diff --staged --quiet; then
            echo "No changes to push"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            NEW_COUNT=$(python3 -c "import json; d=json.load(open('data/pending_review.json')); print(d.get('total_pending', 0))" 2>/dev/null || echo "0")
            if [ "$NEW_COUNT" -gt 0 ]; then
              git commit -m "Auto-fetch: CISA KEV update $(date +'%Y-%m-%d') ($NEW_COUNT new CVEs pending) [skip ci]"
            else
              git commit -m "Update KEV last checked timestamp [skip ci]"
            fi
            git push origin main
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.fetch.outputs.has_new }}" == "true" ]; then
            echo "### New vulnerabilities fetched" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ -f "data/REVIEW_SUMMARY.md" ]; then
              cat data/REVIEW_SUMMARY.md >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### No new vulnerabilities" >> $GITHUB_STEP_SUMMARY
            echo "The CISA KEV catalog has no new entries since last fetch." >> $GITHUB_STEP_SUMMARY
          fi
