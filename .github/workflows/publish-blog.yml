name: Publish Blog Posts & Marketing Content

on:
  schedule:
    # Every Tuesday at 6:00 AM PT (14:00 UTC)
    - cron: '0 14 * * 2'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Each generator is independent. continue-on-error keeps one crash from
      # blocking the rest and the publish step; the "Fail if any generator
      # crashed" gate at the end turns the job red and names the culprit so a
      # failure can't silently rot (see June 2026 null-CVSS blackout).
      - name: Generate CVE pages
        id: cve_pages
        continue-on-error: true
        run: python3 scripts/generate_cve_pages.py

      - name: Generate certification comparisons
        id: comparisons
        continue-on-error: true
        run: python3 scripts/generate_comparisons.py

      - name: Generate weekly threat roundup
        id: threat_roundup
        continue-on-error: true
        run: python3 scripts/generate_threat_roundup.py

      - name: Publish blog posts
        id: publish
        continue-on-error: true
        run: python3 scripts/publish_editorial.py

      - name: Generate social media copy
        id: social
        continue-on-error: true
        run: python3 scripts/generate_social_posts.py

      - name: Generate newsletter copy
        id: newsletter
        continue-on-error: true
        run: python3 scripts/generate_newsletter.py

      - name: Repurpose content for social
        id: repurpose
        continue-on-error: true
        run: python3 scripts/repurpose_content.py

      - name: Generate Reddit post templates
        id: reddit
        continue-on-error: true
        run: python3 scripts/generate_reddit_posts.py

      - name: Inject blog cross-links into guide pages
        id: crosslinks
        continue-on-error: true
        run: python3 scripts/inject_blog_links.py

      - name: Rebuild sitemap and llms.txt
        id: sitemap_llms
        continue-on-error: true
        run: |
          python3 scripts/generate_sitemap.py
          python3 scripts/generate_llms_txt.py

      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        id: push
        if: steps.changes.outputs.changes == 'true'
        continue-on-error: true
        run: |
          git config user.name "FixTheVuln Bot"
          git config user.email "bot@fixthevuln.com"

          git add blog/ cve/ comparisons/ data/ drafts/ sitemap.xml llms.txt llms-full.txt *.html
          git commit -m "Weekly blog publish + marketing content [skip ci]"
          git push

      - name: Summary
        if: steps.changes.outputs.changes == 'true'
        run: |
          echo "Marketing pipeline completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Changes:" >> $GITHUB_STEP_SUMMARY
          git diff HEAD~1 --name-only | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY

      - name: No changes
        if: steps.changes.outputs.changes == 'false'
        run: echo "No new content to publish" >> $GITHUB_STEP_SUMMARY

      # Runs after publishing so anything that succeeded is already committed.
      # Turns the job red and lists every crashed generator.
      - name: Fail if any generator crashed
        if: always()
        run: |
          failed=""
          # Explicit if (not && chaining): under `set -e` a bare `[[ ]] && ...`
          # returns non-zero when the test is false, which would abort the step.
          check() { if [[ "$2" == "failure" ]]; then failed="$failed $1"; fi; }
          check generate_cve_pages.py      "${{ steps.cve_pages.outcome }}"
          check generate_comparisons.py    "${{ steps.comparisons.outcome }}"
          check generate_threat_roundup.py "${{ steps.threat_roundup.outcome }}"
          check publish_editorial.py       "${{ steps.publish.outcome }}"
          check generate_social_posts.py   "${{ steps.social.outcome }}"
          check generate_newsletter.py     "${{ steps.newsletter.outcome }}"
          check repurpose_content.py       "${{ steps.repurpose.outcome }}"
          check generate_reddit_posts.py   "${{ steps.reddit.outcome }}"
          check inject_blog_links.py       "${{ steps.crosslinks.outcome }}"
          check sitemap+llms_txt           "${{ steps.sitemap_llms.outcome }}"
          # 'skipped' (no changes to commit) is not a failure; only a real
          # commit/push crash flags here so the summary can't claim success.
          check commit+push                "${{ steps.push.outcome }}"
          if [[ -n "$failed" ]]; then
            echo "## ⚠️ Pipeline step failures" >> "$GITHUB_STEP_SUMMARY"
            echo "Everything that succeeded was still published. These crashed and need a look:" >> "$GITHUB_STEP_SUMMARY"
            for s in $failed; do
              echo "- \`$s\`" >> "$GITHUB_STEP_SUMMARY"
              echo "::error::Pipeline step failed: $s"
            done
            exit 1
          fi
          echo "All generators and publish succeeded." >> "$GITHUB_STEP_SUMMARY"
